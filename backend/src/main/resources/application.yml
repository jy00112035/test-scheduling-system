server:
  port: 8080

spring:
  application:
    name: test-scheduling-backend

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: TestSchedulingSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
  expiration: 86400000

logging:
  level:
    com.testscheduling: INFO
    org.hibernate.SQL: DEBUG
